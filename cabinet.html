<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный Кабинет — Catalyst Consult</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .lesson-btn { border-radius: 2rem; padding: 16px 24px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 12px; transition: all 0.3s ease; width: 100%; text-align: left; }
        .lesson-active { background-color: #ffffff; color: #0f172a; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .lesson-available { background-color: #0f172a; color: #ffffff; }
        .lesson-locked { background-color: #1e293b; color: #64748b; opacity: 0.6; cursor: not-allowed; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-blur { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const LESSONS = [
            { id: 1, title: "УРОК 1: ВВЕДЕНИЕ В ИНКУБАЦИЮ", desc: "Подробное описание методологии и подготовка проекта." },
            { id: 2, title: "УРОК 2: АНАЛИЗ РЫНКА", desc: "Оценка объема рынка (TAM, SAM, SOM) и конкуренты." },
            { id: 3, title: "УРОК 3: UNIT-ЭКОНОМИКА", desc: "Расчет стоимости привлечения клиента и маржинальности." },
            { id: 4, title: "УРОК 4: MVP И CUSTDEV", desc: "Создание MVP и проведение интервью с пользователями." },
            { id: 5, title: "УРОК 5: ФИНАНСОВАЯ МОДЕЛЬ", desc: "Построение финансовой модели проекта для инвесторов." },
            { id: 6, title: "УРОК 6: ЮРИДИЧЕСКАЯ СТРУКТУРА", desc: "Регистрация интеллектуальной собственности и договора." },
            { id: 7, title: "УРОК 7: МАРКЕТИНГ И ПРОДАЖИ", desc: "Построение воронки продаж и GTM-стратегия." },
            { id: 8, title: "УРОК 8: ПОДГОТОВКА PITCH DECK", desc: "Структура идеальной презентации для инвестора." },
            { id: 9, title: "УРОК 9: РАБОТА С ИНВЕСТОРАМИ", desc: "Оценка проекта и структурирование сделки." },
            { id: 10, title: "УРОК 10: МАСШТАБИРОВАНИЕ", desc: "Стратегия выхода на международные рынки." }
        ];

        const App = () => {
            const [isAuth, setIsAuth] = useState(false);
            const [loginData, setLoginData] = useState({ bin: '', email: '' });
            const [authLoading, setAuthLoading] = useState(false);
            const [authError, setAuthError] = useState('');
            const [userCompany, setUserCompany] = useState('');
            
            const [activeTab, setActiveTab] = useState('courses');
            const [selectedLesson, setSelectedLesson] = useState(0);
            const [unlockedCount, setUnlockedCount] = useState(1);
            const [showTest, setShowTest] = useState(false);
            const [testPassed, setTestPassed] = useState(false);

            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxqjVpRJUIlLLs95dwKAdNGyKRad8gDt1AnwwAktveXzjtYnbUVOn8RquB43o7lE_44/exec";

            const checkAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                if (loginData.bin.length !== 12) {
                    setAuthError('БИН должен содержать 12 цифр');
                    return;
                }
                setAuthLoading(true);
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=login&bin=${loginData.bin}&email=${loginData.email.toLowerCase().trim()}`);
                    const result = await response.json();
                    if (result.auth) {
                        setIsAuth(true);
                        setUserCompany(result.company);
                        if(!localStorage.getItem('catalyst_reg_date')) {
                            localStorage.setItem('catalyst_reg_date', new Date().toISOString());
                        }
                    } else {
                        setAuthError('Данные не найдены. Проверьте БИН и Email.');
                    }
                } catch (err) {
                    setAuthError('Ошибка связи с сервером.');
                } finally {
                    setAuthLoading(false);
                }
            };

            useEffect(() => {
                if (isAuth) {
                    const regDateStr = localStorage.getItem('catalyst_reg_date');
                    const regDate = new Date(regDateStr);
                    const diffDays = Math.floor((new Date() - regDate) / (1000 * 60 * 60 * 24));
                    setUnlockedCount(Math.min(10, diffDays + 1));
                    if(localStorage.getItem('catalyst_test_passed') === 'true') setTestPassed(true);
                }
            }, [isAuth]);

            if (!isAuth) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#0f172a] p-6 text-center">
                        <div className="max-w-md w-full bg-white rounded-[3rem] p-10 shadow-2xl">
                            <div className="w-16 h-16 bg-[#facc15] rounded-2xl flex items-center justify-center font-black text-2xl text-[#0f172a] mx-auto mb-6">C</div>
                            <h2 className="text-2xl font-black uppercase text-[#0f172a] mb-8">Вход в Академию</h2>
                            <form onSubmit={checkAuth} className="space-y-4 text-left">
                                <input type="text" required placeholder="БИН (12 ЦИФР)" className="w-full bg-slate-50 border p-4 rounded-xl outline-none focus:border-[#facc15]" value={loginData.bin} onChange={(e) => setLoginData({...loginData, bin: e.target.value})} />
                                <input type="email" required placeholder="EMAIL" className="w-full bg-slate-50 border p-4 rounded-xl outline-none focus:border-[#facc15]" value={loginData.email} onChange={(e) => setLoginData({...loginData, email: e.target.value})} />
                                {authError && <p className="text-red-500 text-xs font-bold text-center">{authError}</p>}
                                <button type="submit" disabled={authLoading} className="w-full bg-[#0f172a] text-white font-black py-4 rounded-xl hover:scale-105 transition-transform uppercase text-xs tracking-widest">{authLoading ? 'ПРОВЕРКА...' : 'ВОЙТИ'}</button>
                            </form>
                            <a href="index.html" className="inline-block mt-8 text-slate-400 text-[10px] font-black uppercase">На главную</a>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden bg-[#f8fafc]">
                    {/* ЛЕВАЯ ПАНЕЛЬ */}
                    <div className="w-64 bg-white shadow-xl flex flex-col z-20">
                        <div className="p-8 border-b flex items-center gap-3">
                            <div className="w-10 h-10 bg-[#facc15] rounded-xl flex items-center justify-center font-black text-xl text-[#0f172a]">C</div>
                            <div className="font-black uppercase text-sm leading-none">Catalyst<br/><span className="text-[9px] text-[#ca8a04]">Consult</span></div>
                        </div>
                        <div className="p-6 flex-1">
                            <button onClick={() => setActiveTab('courses')} className={`w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-black text-xs uppercase mb-2 ${activeTab === 'courses' ? 'bg-[#0f172a] text-white' : 'text-slate-500'}`}><i className="fas fa-play-circle text-lg"></i> Курсы</button>
                            <button onClick={() => setActiveTab('certificates')} className={`w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-black text-xs uppercase ${activeTab === 'certificates' ? 'bg-[#0f172a] text-white' : 'text-slate-500'}`}><i className="fas fa-award text-lg"></i> Дипломы</button>
                        </div>
                        <div className="p-8 border-t">
                             <p className="text-[10px] font-bold text-slate-400 mb-4">{userCompany}</p>
                             <a href="index.html" className="text-xs font-bold uppercase text-slate-400 hover:text-red-500">Выход</a>
                        </div>
                    </div>

                    {/* ЦЕНТР */}
                    <div className="flex-1 flex flex-col overflow-y-auto">
                        {activeTab === 'courses' ? (
                            <div className="p-10 lg:p-16 max-w-5xl mx-auto w-full">
                                <div className="w-full aspect-video bg-black rounded-[2rem] shadow-2xl flex items-center justify-center mb-10"><i className="fas fa-play text-white text-5xl opacity-30"></i></div>
                                <h1 className="text-3xl font-black uppercase text-[#0f172a] mb-4">{LESSONS[selectedLesson].title}</h1>
                                <p className="text-lg text-slate-500 leading-relaxed">{LESSONS[selectedLesson].desc}</p>
                            </div>
                        ) : (
                            <div className="p-10 lg:p-16 text-center">
                                <h1 className="text-3xl font-black uppercase mb-12">Ваши документы</h1>
                                <div className="bg-white p-16 rounded-[3rem] border border-slate-200 inline-block shadow-sm">
                                     <i className="fas fa-lock text-4xl text-slate-200 mb-4"></i>
                                     <p className="text-slate-400 font-bold uppercase text-xs">Доступно после 10 урока</p>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* ПРАВАЯ ПАНЕЛЬ */}
                    <div className="w-80 bg-white border-l p-6 overflow-y-auto custom-scroll">
                        <p className="text-[10px] font-black uppercase text-slate-400 mb-6">Программа:</p>
                        {LESSONS.map((l, i) => (
                            <button key={l.id} onClick={() => i < unlockedCount && setSelectedLesson(i)} className={`lesson-btn mb-3 ${i === selectedLesson ? 'lesson-active' : i < unlockedCount ? 'lesson-available' : 'lesson-locked'}`}>
                                <i className={`fas ${i < unlockedCount ? (i === selectedLesson ? 'fa-play' : 'fa-play-circle') : 'fa-lock'} text-[#facc15]`}></i>
                                <span>{l.title}</span>
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
