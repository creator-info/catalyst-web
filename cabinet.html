<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | Catalyst</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen">
    <div id="auth-section" class="flex items-center justify-center min-h-screen p-4">
        <div class="glass p-8 rounded-3xl w-full max-w-md shadow-2xl">
            <h1 class="text-3xl font-black mb-8 text-center tracking-tight">ВХОД В КАБИНЕТ</h1>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-yellow-500 transition-all">
                <input type="text" id="bin" placeholder="БИН (12 цифр)" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-yellow-500 transition-all">
                <button onclick="login()" id="login-btn" class="w-full bg-[#facc15] hover:bg-yellow-500 text-slate-900 font-black py-4 rounded-xl transition-all active:scale-95 shadow-lg shadow-yellow-500/20">ВОЙТИ</button>
                <p id="error" class="text-red-400 text-sm text-center hidden font-medium"></p>
            </div>
        </div>
    </div>

    <div id="cabinet-section" class="hidden">
        <nav class="p-6 border-b border-white/5 flex justify-between items-center glass sticky top-0 z-50">
            <span class="font-black text-xl tracking-tighter">CATALYST <span class="text-yellow-500">LMS</span></span>
            <button onclick="location.reload()" class="text-sm opacity-50 hover:opacity-100 transition-all">ВЫЙТИ</button>
        </nav>
        
        <main class="max-w-6xl mx-auto p-6 py-12">
            <header class="mb-12">
                <h2 id="welcome-msg" class="text-4xl font-black mb-2 tracking-tight">ДОБРО ПОЖАЛОВАТЬ!</h2>
                <p class="text-slate-400 font-medium">Ваша программа: Бизнес-инкубация «ОТ 0 К 1»</p>
            </header>

            <div class="grid lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-4">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <span class="w-8 h-8 bg-yellow-500 text-black rounded-lg flex items-center justify-center text-sm">01</span>
                        ОБУЧАЮЩИЕ МОДУЛИ
                    </h3>
                    <div class="glass p-6 rounded-2xl flex justify-between items-center group cursor-pointer hover:bg-white/5 transition-all">
                        <div class="flex gap-4 items-center">
                            <div class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center font-bold text-slate-500">1</div>
                            <div>
                                <h4 class="font-bold group-hover:text-yellow-500 transition-colors">Введение в рынок</h4>
                                <p class="text-xs text-slate-500">Видео-урок + доп. материалы</p>
                            </div>
                        </div>
                        <span class="text-xs bg-white/10 px-3 py-1 rounded-full uppercase tracking-widest font-bold">СКОРО</span>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="glass p-8 rounded-3xl border-yellow-500/20 bg-gradient-to-br from-yellow-500/5 to-transparent">
                        <h3 class="font-black text-xl mb-4">ВАШ СЕРТИФИКАТ</h3>
                        <p class="text-sm text-slate-400 mb-6 leading-relaxed">Доступен после полной оплаты и завершения всех модулей программы.</p>
                        <a id="cert-link" href="#" target="_blank" class="block text-center bg-white/5 border border-white/10 text-white/30 font-bold py-4 rounded-xl cursor-not-allowed transition-all">СКАЧАТЬ PDF</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxuY4PI26WYMqzzTRKdTEugK6dn5qV3zFGMYtfM1W5h-y3wnLriUZ3yr99ElOZbYPTZ/exec";

        async function login() {
            const btn = document.getElementById('login-btn');
            const err = document.getElementById('error');
            const email = document.getElementById('email').value.trim();
            const bin = document.getElementById('bin').value.trim();

            if(!email || !bin) {
                showError("Заполните все поля");
                return;
            }

            btn.disabled = true;
            btn.innerText = "ПРОВЕРКА...";
            err.classList.add('hidden');

            try {
                const response = await fetch(`${SCRIPT_URL}?action=login&bin=${bin}&email=${email}`);
                const data = await response.json();

                if(data.auth) {
                    document.getElementById('auth-section').classList.add('hidden');
                    document.getElementById('cabinet-section').classList.remove('hidden');
                    document.getElementById('welcome-msg').innerText = `ПРИВЕТ, ${data.company.toUpperCase()}!`;
                    
                    if(data.certificate && data.certificate !== "#") {
                        const cBtn = document.getElementById('cert-link');
                        cBtn.href = data.certificate;
                        cBtn.classList.remove('bg-white/5', 'text-white/30', 'cursor-not-allowed');
                        cBtn.classList.add('bg-yellow-500', 'text-slate-900', 'hover:bg-yellow-400');
                        cBtn.innerText = "СКАЧАТЬ СЕРТИФИКАТ";
                    }
                } else {
                    showError(data.error === "access_denied" ? "Доступ не оплачен" : "Данные не найдены");
                }
            } catch (e) {
                showError("Ошибка сервера. Попробуйте позже.");
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerText = "ВОЙТИ";
            }
        }

        function showError(msg) {
            const err = document.getElementById('error');
            err.innerText = msg;
            err.classList.remove('hidden');
        }
    </script>
</body>
</html>
