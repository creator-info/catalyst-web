<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фотогалерея — Catalyst Consult</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #0f172a; color: white; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative overflow-x-hidden">

    <div class="absolute top-8 left-6 lg:left-12 z-50">
        <a href="index.html" class="flex items-center gap-3 text-slate-400 hover:text-[#facc15] transition-colors font-bold uppercase text-xs tracking-widest">
            <i class="fas fa-arrow-left"></i> Назад на главную
        </a>
    </div>

    <main class="flex-grow flex flex-col items-center justify-center py-20 px-6 max-w-7xl mx-auto w-full">
        
        <div class="text-center mb-16 lg:mb-24 mt-10">
            <h1 class="text-5xl lg:text-7xl font-black uppercase tracking-tighter text-white mb-6 drop-shadow-lg">
                Фотогалерея
            </h1>
            <p class="text-[10px] lg:text-xs font-black uppercase tracking-[0.3em] text-slate-400">
                Награды, сертификаты и моменты с наших мероприятий
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 w-full mb-16">
            
            <div class="group bg-white/5 border border-white/10 rounded-[2rem] p-6 transition-all duration-500 hover:bg-white/10 hover:-translate-y-2 hover:shadow-[0_20px_40px_rgba(250,204,21,0.1)] hover:border-[#facc15]/30 flex flex-col">
                <div class="bg-[#0b1120] rounded-2xl aspect-[4/3] flex items-center justify-center overflow-hidden mb-6 relative border border-white/5 group-hover:border-white/10 transition-colors">
                    <i class="fas fa-graduation-cap text-5xl text-slate-700 group-hover:text-slate-500 transition-colors"></i>
                </div>
                <div class="mt-auto">
                    <p class="text-[11px] font-black uppercase tracking-widest text-[#facc15]">Сертификат SDU Extension Center</p>
                </div>
            </div>

            <div class="group bg-white/5 border border-white/10 rounded-[2rem] p-6 transition-all duration-500 hover:bg-white/10 hover:-translate-y-2 hover:shadow-[0_20px_40px_rgba(250,204,21,0.1)] hover:border-[#facc15]/30 flex flex-col">
                <div class="bg-[#0b1120] rounded-2xl aspect-[4/3] flex items-center justify-center overflow-hidden mb-6 relative border border-white/5 group-hover:border-white/10 transition-colors">
                    <i class="fas fa-camera text-5xl text-slate-700 group-hover:text-slate-500 transition-colors"></i>
                    <span class="absolute bottom-6 text-[9px] font-black uppercase tracking-[0.2em] text-slate-600">Место для вашего фото</span>
                </div>
                <div class="mt-auto">
                    <p class="text-[11px] font-black uppercase tracking-widest text-[#facc15]">Практикум Алматы 2026</p>
                </div>
            </div>

            <div class="group bg-white/5 border border-white/10 rounded-[2rem] p-6 transition-all duration-500 hover:bg-white/10 hover:-translate-y-2 hover:shadow-[0_20px_40px_rgba(250,204,21,0.1)] hover:border-[#facc15]/30 flex flex-col">
                <div class="bg-[#0b1120] rounded-2xl aspect-[4/3] flex items-center justify-center overflow-hidden mb-6 relative border border-white/5 group-hover:border-white/10 transition-colors">
                    <i class="fas fa-award text-5xl text-slate-700 group-hover:text-slate-500 transition-colors"></i>
                    <span class="absolute bottom-6 text-[9px] font-black uppercase tracking-[0.2em] text-slate-600">Лицензия / Награда</span>
                </div>
                <div class="mt-auto">
                    <p class="text-[11px] font-black uppercase tracking-widest text-[#facc15]">Благодарственное письмо QazInnovations</p>
                </div>
            </div>

        </div>

        <div class="text-center">
            <a href="#" target="_blank" class="inline-flex items-center gap-3 text-xs font-black uppercase tracking-widest text-slate-400 hover:text-[#facc15] border border-slate-700 hover:border-[#facc15] py-4 px-8 rounded-xl transition-all hover:bg-[#facc15]/10">
                <i class="fab fa-google-drive text-lg"></i> Открыть материалы на Google Диск
            </a>
        </div>

    </main>

</body>
</html>
