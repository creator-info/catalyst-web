<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalyst Consult - Инкубация 0→1</title>
    
    <!-- Подключаем Tailwind CSS для дизайна -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Подключаем иконки FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Подключаем React для работы интерфейса прямо в браузере -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // НАСТРОЙКА СЕРВЕРА (ВНИМАНИЕ!)
        // ==========================================
        // ЗАМЕНИТЕ "ВАШ_ЛОГИН" НА ВАШ ИМЯ ПОЛЬЗОВАТЕЛЯ В PYTHONANYWHERE
        const API_URL = "https://ВАШ_ЛОГИН.pythonanywhere.com"; 

        // --- MOCK ДАННЫЕ УРОКОВ ---
        const EXPERTS = [
          { id: 1, name: "Аскар Болатов", role: "MBA-стратегия", desc: "Эксперт по масштабированию бизнеса." },
          { id: 2, name: "Динара Сакенова", role: "Корпоративные Финансы", desc: "Привлечение инвестиций и фин. моделирование." },
          { id: 3, name: "Тимур Омаров", role: "НПА-Комплаенс", desc: "Юридическое сопровождение проектов." },
          { id: 4, name: "Елена Кан", role: "Data Science & AI", desc: "Внедрение данных в бизнес-процессы." },
          { id: 5, name: "Марат Исаев", role: "Performance Маркетинг", desc: "Стратегии выхода на международные рынки." },
          { id: 6, name: "Алия Нуртаева", role: "Финансовый Аудит", desc: "Подготовка к Due Diligence." },
          { id: 7, name: "Руслан Ким", role: "Tech Скаутинг", desc: "Поиск инновационных решений и стартапов." }
        ];

        const INITIAL_LESSONS = Array.from({ length: 10 }, (_, i) => ({
          id: i + 1,
          title: `Урок ${i + 1}: ${['Введение в инкубацию', 'Анализ рынка', 'Unit-экономика', 'MVP и CustDev', 'Финансовая модель', 'Юридическая структура', 'Маркетинг и продажи', 'Подготовка Pitch Deck', 'Работа с инвесторами', 'Масштабирование'][i]}`,
          desc: "Подробное описание методологии, практические задания и чек-листы для подготовки вашего проекта к инвестициям.",
          dayRequired: i, 
        }));

        // --- ГЛАВНЫЙ КОМПОНЕНТ ---
        function App() {
          const [currentRoute, setCurrentRoute] = useState('home'); 
          const [user, setUser] = useState(null); 
          const [isMenuOpen, setIsMenuOpen] = useState(false);
          const [checkoutModal, setCheckoutModal] = useState({ isOpen: false, type: 'course' }); 

          // Глобальные состояния (теперь данные Админки берутся с сервера!)
          const [lessons, setLessons] = useState(INITIAL_LESSONS);
          const [usersDb, setUsersDb] = useState([]);
          const [metrics, setMetrics] = useState({ revenueCourse: 0, revenueCorrection: 0 });

          const navigate = (route) => {
            setCurrentRoute(route);
            setIsMenuOpen(false);
            window.scrollTo(0, 0);
          };

          // Загрузка пользователей с PythonAnywhere для Админ-панели
          useEffect(() => {
            if (currentRoute === 'admin') {
               fetch(`${API_URL}/api/users`)
                 .then(res => res.json())
                 .then(data => {
                    setUsersDb(data);
                    // Считаем выручку на основе реальных пользователей
                    const rev = data.length * 10000;
                    setMetrics(prev => ({ ...prev, revenueCourse: rev }));
                 })
                 .catch(err => console.error("Ошибка загрузки БД:", err));
            }
          }, [currentRoute]);

          const handleLogout = () => {
            setUser(null);
            navigate('home');
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-900 flex flex-col">
              {/* HEADER */}
              <header className="bg-[#0f172a] text-white sticky top-0 z-40 shadow-md">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-center h-20">
                    <div className="flex items-center cursor-pointer" onClick={() => navigate('home')}>
                      <div className="w-10 h-10 bg-yellow-600 rounded flex items-center justify-center mr-3 font-bold text-xl">C</div>
                      <div>
                        <h1 className="text-xl font-bold tracking-tight">CATALYST</h1>
                        <p className="text-xs text-slate-400 uppercase tracking-widest">Consulting</p>
                      </div>
                    </div>
                    
                    <nav className="hidden md:flex space-x-8 items-center">
                      {currentRoute === 'home' && (
                        <>
                          <a href="#about" className="text-sm font-medium hover:text-yellow-500 transition-colors">Об инкубации</a>
                          <a href="#experts" className="text-sm font-medium hover:text-yellow-500 transition-colors">Академия экспертов</a>
                          <a href="#program" className="text-sm font-medium hover:text-yellow-500 transition-colors">Программа</a>
                        </>
                      )}
                      {user ? (
                        <div className="flex items-center space-x-4">
                          <span className="text-sm text-slate-300">{user.email}</span>
                          <button 
                            onClick={() => navigate(user.role === 'admin' ? 'admin' : 'lms')}
                            className="text-sm font-medium bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded transition"
                          >
                            Кабинет
                          </button>
                          <button onClick={handleLogout} className="text-slate-400 hover:text-white">
                            <i className="fas fa-sign-out-alt"></i>
                          </button>
                        </div>
                      ) : (
                        <button 
                          onClick={() => setCheckoutModal({ isOpen: true, type: 'course' })}
                          className="bg-yellow-600 hover:bg-yellow-500 text-white px-6 py-2.5 rounded text-sm font-bold shadow-lg transition-all"
                        >
                          Пройти инкубацию (10 000 ₸)
                        </button>
                      )}
                    </nav>

                    <div className="md:hidden flex items-center">
                      <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="text-slate-300 hover:text-white">
                        <i className={`fas ${isMenuOpen ? 'fa-times' : 'fa-bars'} text-2xl`}></i>
                      </button>
                    </div>
                  </div>
                </div>
              </header>

              {/* МЕНЮ ДЛЯ МОБИЛЬНЫХ */}
              {isMenuOpen && (
                <div className="md:hidden bg-[#0f172a] text-white absolute top-20 left-0 w-full z-30 shadow-xl border-t border-slate-800 p-4">
                  <div className="flex flex-col space-y-4">
                     {!user && (
                         <button 
                         onClick={() => { setCheckoutModal({ isOpen: true, type: 'course' }); setIsMenuOpen(false); }}
                         className="bg-yellow-600 w-full py-3 rounded font-bold text-center"
                       >
                         Войти / Купить курс
                       </button>
                     )}
                     {user && (
                         <>
                            <button onClick={() => navigate(user.role === 'admin' ? 'admin' : 'lms')} className="bg-slate-800 w-full py-3 rounded font-bold text-center">
                                Мой кабинет
                            </button>
                            <button onClick={handleLogout} className="text-slate-400 py-2 text-center">Выйти</button>
                         </>
                     )}
                  </div>
                </div>
              )}

              {/* ОСНОВНОЙ КОНТЕНТ */}
              <main className="flex-grow flex flex-col">
                {currentRoute === 'home' && <LandingPage setCheckoutModal={setCheckoutModal} lessons={lessons} />}
                {currentRoute === 'lms' && user?.role === 'student' && <StudentLMS user={user} setUser={setUser} lessons={lessons} setCheckoutModal={setCheckoutModal} />}
                {currentRoute === 'admin' && user?.role === 'admin' && <AdminPanel metrics={metrics} users={usersDb} lessons={lessons} />}
                {currentRoute === 'offer' && <PublicOfferPage onBack={() => navigate('home')} />}
                {currentRoute === 'privacy' && <PrivacyPolicyPage onBack={() => navigate('home')} />}
              </main>

              {/* ПОДВАЛ */}
              <footer className="bg-[#0f172a] text-slate-400 py-8 border-t border-slate-800">
                <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center text-sm">
                  <p>© 2026 ТОО «ADAM LABS». БИН 220440012697.</p>
                  <div className="flex space-x-4 mt-4 md:mt-0">
                    <button onClick={() => navigate('offer')} className="hover:text-white transition-colors">Публичная оферта</button>
                    <button onClick={() => navigate('privacy')} className="hover:text-white transition-colors">Политика конфиденциальности</button>
                  </div>
                </div>
              </footer>

              {/* МОДАЛЬНОЕ ОКНО ОПЛАТЫ */}
              {checkoutModal.isOpen && (
                <CheckoutFlow 
                  type={checkoutModal.type} 
                  onClose={() => setCheckoutModal({ isOpen: false, type: 'course' })} 
                  setUser={setUser}
                  navigate={navigate}
                />
              )}
            </div>
          );
        }

        // ==========================================
        // ГЛАВНАЯ СТРАНИЦА
        // ==========================================
        function LandingPage({ setCheckoutModal, lessons }) {
          const [openAccordion, setOpenAccordion] = useState(0);

          return (
            <div className="w-full">
              <section className="bg-[#0f172a] text-white pt-20 pb-32 relative overflow-hidden">
                <div className="absolute top-0 right-0 -mr-20 -mt-20 w-96 h-96 bg-yellow-600/10 rounded-full blur-3xl"></div>
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 flex flex-col md:flex-row items-center">
                  <div className="md:w-3/5 pr-8">
                    <div className="inline-block px-3 py-1 bg-slate-800 text-yellow-500 rounded-full text-xs font-semibold tracking-wider mb-6 border border-slate-700">
                      ПРЕМИУМ КОНСАЛТИНГ
                    </div>
                    <h1 className="text-4xl md:text-6xl font-extrabold leading-tight mb-6">
                      Catalyst Consult — <br/>
                      <span className="text-slate-300 font-light">экспертное сопровождение</span> инвестиционных проектов.
                    </h1>
                    <p className="text-lg text-slate-400 mb-10 max-w-2xl leading-relaxed">
                      Комплексная подготовка вашего бизнеса к привлечению инвестиций на уровне стандартов НИХ «Байтерек».
                    </p>
                    <button 
                        onClick={() => setCheckoutModal({ isOpen: true, type: 'course' })}
                        className="bg-yellow-600 hover:bg-yellow-500 text-white px-8 py-4 rounded font-bold text-lg shadow-[0_0_20px_rgba(202,138,4,0.3)] transition-all flex items-center justify-center w-max"
                      >
                        Пройти инкубацию (10 000 ₸)
                        <i className="fas fa-chevron-right ml-2"></i>
                      </button>
                  </div>
                  <div className="md:w-2/5 mt-16 md:mt-0">
                    <div className="bg-slate-800/50 border border-slate-700 p-8 rounded-xl backdrop-blur-sm text-center">
                      <div className="w-24 h-24 bg-white rounded-full mx-auto flex items-center justify-center mb-6 shadow-lg">
                        <span className="text-[#0f172a] font-extrabold text-2xl">SDU</span>
                      </div>
                      <h3 className="text-xl font-bold mb-2">Академический партнер</h3>
                      <p className="text-slate-400 text-sm">Программа разработана совместно с экспертами SDU University.</p>
                    </div>
                  </div>
                </div>
              </section>

              <section id="experts" className="py-24 bg-slate-50">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="text-center mb-16">
                    <h2 className="text-3xl md:text-4xl font-bold text-[#0f172a] mb-4">Коллегия 7 экспертов</h2>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    {EXPERTS.map((expert) => (
                      <div key={expert.id} className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <div className="w-16 h-16 bg-slate-100 rounded-full mb-4 flex items-center justify-center text-slate-400 text-2xl">
                          <i className="fas fa-user-tie"></i>
                        </div>
                        <h3 className="font-bold text-lg text-[#0f172a]">{expert.name}</h3>
                        <p className="text-yellow-600 font-medium text-sm mb-3">{expert.role}</p>
                        <p className="text-slate-500 text-sm">{expert.desc}</p>
                      </div>
                    ))}
                     <div className="bg-[#0f172a] p-6 rounded-xl shadow-sm border border-slate-800 flex flex-col justify-center text-white text-center">
                        <i className="fas fa-shield-alt text-yellow-500 text-4xl mb-4"></i>
                        <h3 className="font-bold text-lg mb-2">Высший стандарт</h3>
                      </div>
                  </div>
                </div>
              </section>

              <section id="program" className="py-24 bg-white border-t border-slate-200">
                <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                   <div className="text-center mb-16">
                    <h2 className="text-3xl md:text-4xl font-bold text-[#0f172a] mb-4">Программа инкубации 0→1</h2>
                  </div>
                  <div className="space-y-4">
                    {lessons.map((lesson, idx) => (
                      <div key={lesson.id} className="border border-slate-200 rounded-lg overflow-hidden">
                        <button 
                          onClick={() => setOpenAccordion(openAccordion === idx ? null : idx)}
                          className="w-full px-6 py-4 flex justify-between items-center bg-slate-50 hover:bg-slate-100 transition-colors text-left"
                        >
                          <span className="font-bold text-[#0f172a]">{lesson.title}</span>
                          <i className={`fas fa-chevron-${openAccordion === idx ? 'down' : 'right'} text-slate-400`}></i>
                        </button>
                        {openAccordion === idx && (
                          <div className="px-6 py-4 bg-white text-slate-600 border-t border-slate-200 flex items-start">
                            <i className="fas fa-play-circle text-yellow-600 mr-4 mt-1 text-xl"></i>
                            <p>{lesson.desc}</p>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              </section>
            </div>
          );
        }

        // ==========================================
        // БЛОК ОПЛАТЫ И РЕГИСТРАЦИИ (ИНТЕГРАЦИЯ С PYTHONANYWHERE)
        // ==========================================
        function CheckoutFlow({ type, onClose, setUser, navigate }) {
          const [step, setStep] = useState(1);
          const [showOffer, setShowOffer] = useState(false);
          const [email, setEmail] = useState('');
          const [phone, setPhone] = useState('');
          const [agreed, setAgreed] = useState(false);
          const [errorMsg, setErrorMsg] = useState('');

          const handlePay = async () => {
            setStep(2);
            setErrorMsg('');
            
            try {
              // 1. ОТПРАВЛЯЕМ ДАННЫЕ НА ВАШ СЕРВЕР В PYTHONANYWHERE
              const response = await fetch(`${API_URL}/api/register`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ email: email, phone: phone })
              });
              
              const data = await response.json();

              // Имитация ожидания ответа от банка (2 секунды)
              setTimeout(() => {
                  if (data.success) {
                      // 2. УСПЕШНО! ПУСКАЕМ В КАБИНЕТ
                      const isAdmin = email === 'admin@catalyst.kz';
                      setUser({
                          email, phone, role: isAdmin ? 'admin' : 'student',
                          daysActive: 0, progress: 0, hasCertificate: false
                      });
                      navigate(isAdmin ? 'admin' : 'lms');
                      onClose();
                  } else {
                      // ОШИБКА (например, email уже есть)
                      setStep(1);
                      setErrorMsg(data.message || "Ошибка регистрации");
                  }
              }, 2000);

            } catch (err) {
                setStep(1);
                setErrorMsg("Ошибка связи с сервером. Проверьте ваш логин PythonAnywhere в коде!");
            }
          };

          return (
            <div className="fixed inset-0 bg-[#0f172a]/80 backdrop-blur-sm flex items-center justify-center z-50 px-4">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden relative">
                {step === 1 ? (
                  <>
                    <div className="bg-[#0f172a] px-6 py-4 flex justify-between items-center text-white">
                      <h3 className="font-bold text-lg">Оплата инкубации</h3>
                      <button onClick={onClose} className="text-slate-400 hover:text-white"><i className="fas fa-times"></i></button>
                    </div>
                    
                    <div className="p-6">
                      {errorMsg && <div className="bg-red-100 text-red-700 p-3 rounded mb-4 text-sm font-bold border border-red-200">{errorMsg}</div>}
                      
                      <div className="mb-4">
                        <label className="block text-sm font-medium text-slate-700 mb-1">Email (для входа)</label>
                        <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="Введите email" className="w-full px-4 py-2 border rounded" />
                      </div>
                      <div className="mb-6">
                        <label className="block text-sm font-medium text-slate-700 mb-1">Номер телефона</label>
                        <input type="tel" value={phone} onChange={e => setPhone(e.target.value)} placeholder="+7 (___) ___-__-__" className="w-full px-4 py-2 border rounded" />
                      </div>

                      <div className="mb-6 bg-slate-50 p-3 rounded border border-slate-200 flex items-start">
                        <input type="checkbox" id="offer" checked={agreed} onChange={e => setAgreed(e.target.checked)} className="mt-1 mr-3 cursor-pointer" />
                        <label htmlFor="offer" className="text-xs text-slate-600 cursor-pointer">
                          Я согласен с условиями <button type="button" onClick={(e) => { e.preventDefault(); setShowOffer(true); }} className="text-[#0f172a] underline font-medium">Публичной оферты</button>.
                        </label>
                      </div>

                      <button 
                        disabled={!agreed || !email || !phone} onClick={handlePay}
                        className={`w-full py-3 rounded font-bold text-lg transition-all ${agreed && email && phone ? 'bg-yellow-600 hover:bg-yellow-500 text-white' : 'bg-slate-200 text-slate-400'}`}
                      >
                        Оплатить 10 000 ₸
                      </button>
                    </div>
                  </>
                ) : (
                  <div className="p-12 text-center">
                    <i className="fas fa-sync-alt fa-spin text-yellow-600 text-5xl mb-4"></i>
                    <h3 className="font-bold text-xl text-[#0f172a] mb-2">Связь с сервером...</h3>
                    <p className="text-slate-500 text-sm">Проверяем оплату и сохраняем вас в базу данных на PythonAnywhere.</p>
                  </div>
                )}

                {/* ВНУТРЕННЕЕ МОДАЛЬНОЕ ОКНО ДЛЯ ТЕКСТА ОФЕРТЫ */}
                {showOffer && (
                  <div className="absolute inset-0 bg-white z-10 flex flex-col h-full w-full">
                    <div className="bg-[#0f172a] px-6 py-4 flex justify-between items-center text-white flex-shrink-0">
                      <div className="flex items-center">
                        <button onClick={() => setShowOffer(false)} className="mr-3 text-slate-400 hover:text-white"><i className="fas fa-arrow-left"></i></button>
                        <h3 className="font-bold text-lg">Публичная оферта</h3>
                      </div>
                    </div>
                    <div className="p-6 overflow-y-auto flex-1">
                      <PublicOfferContent />
                    </div>
                    <div className="p-4 border-t border-slate-200 bg-slate-50 flex-shrink-0">
                      <button 
                        onClick={() => { setAgreed(true); setShowOffer(false); }}
                        className="w-full bg-[#0f172a] hover:bg-slate-800 text-white py-3 rounded font-bold transition-colors"
                      >
                        Прочитал и согласен
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        // ==========================================
        // ПАНЕЛЬ АДМИНА
        // ==========================================
        function AdminPanel({ metrics, users }) {
          return (
            <div className="flex-grow flex bg-slate-100">
              <div className="w-64 bg-[#0f172a] text-slate-300 flex flex-col p-4 space-y-2">
                 <button className="bg-slate-800 text-white w-full text-left px-4 py-3 rounded"><i className="fas fa-users mr-3"></i> База из Python</button>
              </div>
              <div className="flex-1 p-8">
                 <h1 className="text-2xl font-bold mb-8">CRM: Реальные данные с сервера</h1>
                 
                 <div className="grid grid-cols-2 gap-6 mb-8">
                    <div className="bg-white p-6 rounded-xl shadow-sm border">
                       <p className="text-sm text-slate-500 mb-1">Реальная выручка (БД)</p>
                       <p className="text-3xl font-bold">{metrics.revenueCourse.toLocaleString('ru-RU')} ₸</p>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border">
                       <p className="text-sm text-slate-500 mb-1">Зарегистрировано в БД</p>
                       <p className="text-3xl font-bold">{users.length} чел.</p>
                    </div>
                 </div>

                 <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
                    <table className="w-full text-left text-sm">
                       <thead className="bg-slate-50 text-slate-500 uppercase border-b">
                          <tr><th className="p-4">ID</th><th className="p-4">Email / Телефон</th><th className="p-4">Статус</th><th className="p-4">Роль</th></tr>
                       </thead>
                       <tbody>
                          {users.map(u => (
                             <tr key={u.id} className="border-b">
                                <td className="p-4 font-mono text-slate-500">{u.id}</td>
                                <td className="p-4 font-bold">{u.email} <br/><span className="text-xs text-slate-500 font-normal">{u.phone}</span></td>
                                <td className="p-4"><span className="bg-green-100 text-green-700 px-2 py-1 rounded text-xs uppercase">{u.status}</span></td>
                                <td className="p-4">{u.role}</td>
                             </tr>
                          ))}
                       </tbody>
                    </table>
                 </div>
              </div>
            </div>
          );
        }

        // ==========================================
        // ДОКУМЕНТЫ (ОФЕРТА И ПОЛИТИКА)
        // ==========================================
