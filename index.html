                                            <div className="flex items-center gap-4 mb-3">
                                                <div className="w-12 h-12 bg-white rounded-xl flex items-center justify-center font-black text-[#0f172a] text-[10px] shrink-0">SDU</div>
                                                <p className="text-[10px] font-black text-[#facc15] uppercase tracking-[0.2em] leading-tight">Академический партнер</p>
                                            </div>
                                            <p className="text-xs font-medium opacity-90 leading-relaxed">Официальная программа подготовки проектов, разработанная совместно с экспертами <b>SDU University</b> по спецзаказу <b>НАРИ АО Qazinnovations</b>.</p>
                                        </div>
                                        <div className="bg-red-50 border border-red-200 p-6 rounded-3xl shadow-sm flex items-center">
                                            <p className="text-xs font-bold text-red-700 leading-relaxed">
                                                <i className="fas fa-exclamation-triangle text-red-500 mr-2 text-lg"></i>
                                                <b>КРИТИЧЕСКОЕ УВЕДОМЛЕНИЕ:</b> Название проекта в выдаваемом сертификате должно <b>СТРОГО</b> соответствовать вашей заявке на грантовое финансирование!
                                            </p>
                                        </div>
                                    </div>

                                    {/* Видео-заглушка для введения */}
                                    <div className="w-full aspect-video bg-[#0f172a] rounded-[2rem] shadow-xl relative overflow-hidden flex items-center justify-center mb-10 group cursor-pointer border-4 border-slate-100">
                                        <div className="absolute inset-0 bg-[#facc15]/10 group-hover:bg-[#facc15]/20 transition-all"></div>
                                        <div className="w-20 h-20 bg-[#facc15] rounded-full flex items-center justify-center pl-2 shadow-[0_10px_30px_rgba(202,138,4,0.4)] transform group-hover:scale-110 transition-all">
                                            <i className="fas fa-play text-3xl text-[#0f172a]"></i>
                                        </div>
                                        <span className="absolute bottom-6 left-8 text-white font-black uppercase tracking-widest text-xs opacity-70">Смотреть Введение в программу</span>
                                    </div>

                                    {/* Детальный список модулей */}
                                    <h4 className="text-lg font-black uppercase mb-6 text-[#0f172a] text-center border-b-2 border-slate-100 pb-4">Содержание 10 модулей:</h4>
                                    <div className="space-y-4 mb-10">
                                        {INCUBATION_LESSONS.map((lesson, i) => (
                                            <div key={i} className={`p-5 rounded-2xl flex flex-col md:flex-row md:items-center gap-4 border transition-colors ${i === 0 ? 'bg-yellow-50 border-yellow-200' : 'bg-white border-slate-200'}`}>
                                                <div className="font-black uppercase text-sm shrink-0 md:w-1/3 flex items-center gap-3">
                                                    <i className={`fas fa-play ${i === 0 ? 'text-[#ca8a04]' : 'text-slate-300'}`}></i> 
                                                    <span className={i === 0 ? 'text-[#0f172a]' : 'text-slate-600'}>{lesson.title}</span>
                                                </div>
                                                <p className="text-xs font-medium text-slate-500 leading-relaxed md:w-2/3">
                                                    {lesson.desc}
                                                </p>
                                            </div>
                                        ))}
                                    </div>

                                    <button onClick={() => setModal('reg')} className="w-full btn-primary py-7 rounded-2xl text-lg shadow-2xl">ПЕРЕЙТИ К РЕГИСТРАЦИИ (10 000 ₸)</button>
                                </div>
                            )}

                            {/* 2. РЕГИСТРАЦИЯ */}
                            {modal === 'reg' && (
                                <div className="bg-white text-slate-900 w-full max-w-xl rounded-[3rem] p-12 shadow-2xl relative">
                                    <button onClick={() => setModal('none')} className="absolute top-8 right-8 text-slate-300 hover:text-black"><i className="fas fa-times text-2xl"></i></button>
                                    <form onSubmit={(e) => { e.preventDefault(); localStorage.setItem('catalyst_project_name', e.target.projectName.value); setModal('pay'); }} className="space-y-5">
                                        <h3 className="text-3xl font-black uppercase tracking-tighter text-center mb-8">Регистрация</h3>
                                        
                                        <input type="email" placeholder="EMAIL" className="w-full bg-slate-50 p-6 rounded-2xl font-bold uppercase text-xs outline-none border border-slate-200 focus:border-[#facc15]" required/>
                                        <input type="tel" placeholder="ТЕЛЕФОН (+7)" className="w-full bg-slate-50 p-6 rounded-2xl font-bold uppercase text-xs outline-none border border-slate-200 focus:border-[#facc15]" required/>
                                        
                                        <div className="grid grid-cols-2 gap-4">
                                            <input type="text" placeholder="КОМПАНИЯ (ТОО/ИП)" className="w-full bg-slate-50 p-6 rounded-2xl font-bold uppercase text-xs outline-none border border-slate-200 focus:border-[#facc15]" required/>
                                            <input type="text" placeholder="БИН / ИИН" className="w-full bg-slate-50 p-6 rounded-2xl font-bold uppercase text-xs outline-none border border-slate-200 focus:border-[#facc15]" required/>
                                        </div>

                                        <input name="projectName" type="text" placeholder="НАИМЕНОВАНИЕ ПРОЕКТА (КАК В ЗАЯВКЕ!)" className="w-full bg-red-50 p-6 rounded-2xl font-black uppercase text-xs border-2 border-red-300 focus:border-red-500 placeholder-red-400" required/>
                                        
                                        <button type="submit" className="w-full btn-primary py-6 rounded-2xl mt-4">Далее к оплате</button>
                                    </form>
                                </div>
                            )}

                            {/* 3. ОПЛАТА */}
                            {modal === 'pay' && (
                                <div className="bg-white text-slate-900 w-full max-w-md rounded-[3.5rem] p-12 shadow-2xl relative text-center">
                                    <button onClick={() => setModal('none')} className="absolute top-8 right-8 text-slate-300 hover:text-black"><i className="fas fa-times text-2xl"></i></button>
                                    <div className="text-7xl font-black text-[#ca8a04] mb-10 tracking-tighter">10 000 ₸</div>
                                    <label className="flex items-start gap-4 bg-slate-50 p-6 rounded-3xl border border-slate-100 cursor-pointer text-left mb-10">
                                        <input type="checkbox" onChange={e => setAgreed(e.target.checked)} className="mt-1 accent-[#ca8a04] w-5 h-5" />
                                        <span className="text-[11px] font-bold text-slate-500 uppercase leading-relaxed italic">Я согласен с Договором оферты и Политикой конфиденциальности.</span>
                                    </label>
                                    <div className="space-y-4">
                                        <button disabled={!agreed} onClick={() => window.location.href='cabinet.html'} className="w-full py-6 border-2 border-red-500 text-red-600 rounded-2xl font-black uppercase text-[12px] disabled:opacity-30 hover:bg-red-50 transition-colors">Оплатить Kaspi.kz</button>
                                        <button disabled={!agreed} onClick={() => window.location.href='cabinet.html'} className="w-full py-6 border-2 border-green-600 text-green-700 rounded-2xl font-black uppercase text-[12px] disabled:opacity-30 hover:bg-green-50 transition-colors">Оплатить Halyk</button>
                                    </div>
                                </div>
                            )}

                            {/* 4. ЗАЯВКА ПАРТНЕРА / ПРАКТИКУМ */}
                            {modal === 'partner' && (
                                <div className="bg-white text-slate-900 w-full max-w-xl rounded-[3rem] p-12 shadow-2xl relative">
                                    <button onClick={() => setModal('none')} className="absolute top-8 right-8 text-slate-300 hover:text-black"><i className="fas fa-times text-2xl"></i></button>
                                    <form action="https://formspree.io/f/info@catalyst-consult.kz" method="POST" className="space-y-6">
                                        <h3 className="text-3xl font-black uppercase tracking-tighter text-center mb-8">Отправить заявку</h3>
                                        <input type="text" name="name" placeholder="ФИО ПОЛНОСТЬЮ" className="w-full bg-slate-50 p-6 rounded-2xl font-bold uppercase text-xs outline-none border border-slate-200 focus:border-[#ca8a04]" required/>
                                        <input type="tel" name="phone" placeholder="ТЕЛЕФОН (+7)" className="w-full bg-slate-50 p-6 rounded-2xl font-bold uppercase text-xs outline-none border border-slate-200 focus:border-[#ca8a04]" required/>
                                        <select name="role" className="w-full bg-slate-50 p-6 rounded-2xl font-bold uppercase text-xs outline-none border border-slate-200 cursor-pointer appearance-none">
                                            <option value="">ВЫБЕРИТЕ ПРОГРАММУ</option>
                                            <option value="practicum">ОФФЛАЙН ПРАКТИКУМ (15 АПРЕЛЯ)</option>
                                            <option value="scout">ИНВЕСТИЦИОННЫЙ СКАУТ</option>
                                            <option value="expert">ЭКСПЕРТ-АНАЛИТИК</option>
                                            <option value="partner">ГЕНЕРАЛЬНЫЙ ПАРТНЕР</option>
                                        </select>
                                        <button type="submit" className="w-full btn-primary py-7 rounded-2xl">Отправить заявку</button>
                                    </form>
                                </div>
                            )}

                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
