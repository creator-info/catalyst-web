<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalyst Consult — Платформа инкубации 0→1</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- КОНФИГУРАЦИЯ ---
        const API_URL = "https://AigerimMu.pythonanywhere.com";

        // --- ЭМУЛЯЦИЯ LUCIDE-REACT ЧЕРЕЗ FONTAWESOME ---
        // Это позволяет оставить ваш код без изменений (использовать <Menu />, <X /> и т.д.)
        const Menu = () => <i className="fas fa-bars"></i>;
        const X = () => <i className="fas fa-times"></i>;
        const ChevronDown = () => <i className="fas fa-chevron-down"></i>;
        const ChevronRight = () => <i className="fas fa-chevron-right"></i>;
        const PlayCircle = ({ size, className }) => <i className={`fas fa-play-circle ${className}`} style={{fontSize: size}}></i>;
        const Lock = ({ size, className }) => <i className={`fas fa-lock ${className}`} style={{fontSize: size}}></i>;
        const CheckCircle = ({ size, className }) => <i className={`fas fa-check-circle ${className}`} style={{fontSize: size}}></i>;
        const FileText = ({ size, className }) => <i className={`fas fa-file-alt ${className}`} style={{fontSize: size}}></i>;
        const AlertTriangle = ({ size, className }) => <i className="fas fa-exclamation-triangle"></i>;
        const Users = ({ size, className }) => <i className="fas fa-users"></i>;
        const BookOpen = ({ size, className }) => <i className="fas fa-book-open"></i>;
        const Settings = ({ size, className }) => <i className="fas fa-cog"></i>;
        const BarChart3 = ({ size, className }) => <i className="fas fa-chart-bar"></i>;
        const LogOut = ({ size }) => <i className="fas fa-sign-out-alt" style={{fontSize: size}}></i>;
        const Award = ({ size }) => <i className="fas fa-award" style={{fontSize: size}}></i>;
        const RefreshCcw = ({ className, size }) => <i className={`fas fa-sync-alt fa-spin ${className}`} style={{fontSize: size}}></i>;
        const ShieldCheck = ({ size }) => <i className="fas fa-shield-alt" style={{fontSize: size}}></i>;
        const ArrowLeft = ({ size }) => <i className="fas fa-arrow-left" style={{fontSize: size}}></i>;
        const FastForward = ({ size }) => <i className="fas fa-fast-forward" style={{fontSize: size}}></i>;

        // --- MOCK DATA ---
        const EXPERTS = [
          { id: 1, name: "Аскар Болатов", role: "MBA-стратегия", desc: "Эксперт по масштабированию бизнеса." },
          { id: 2, name: "Динара Сакенова", role: "Корпоративные Финансы", desc: "Привлечение инвестиций и фин. моделирование." },
          { id: 3, name: "Тимур Омаров", role: "НПА-Комплаенс", desc: "Юридическое сопровождение проектов." },
          { id: 4, name: "Елена Кан", role: "Data Science & AI", desc: "Внедрение данных в бизнес-процессы." },
          { id: 5, name: "Марат Исаев", role: "Performance Маркетинг", desc: "Стратегии выхода на международные рынки." },
          { id: 6, name: "Алия Нуртаева", role: "Финансовый Аудит", desc: "Подготовка к Due Diligence." },
          { id: 7, name: "Руслан Ким", role: "Tech Скаутинг", desc: "Поиск инновационных решений и стартапов." }
        ];

        const INITIAL_LESSONS = Array.from({ length: 10 }, (_, i) => ({
          id: i + 1,
          title: `Урок ${i + 1}: ${['Введение в инкубацию', 'Анализ рынка', 'Unit-экономика', 'MVP и CustDev', 'Финансовая модель', 'Юридическая структура', 'Маркетинг и продажи', 'Подготовка Pitch Deck', 'Работа с инвесторами', 'Масштабирование'][i]}`,
          desc: "Подробное описание методологии, практические задания и чек-листы для подготовки вашего проекта к инвестициям.",
          dayRequired: i, 
        }));

        // --- MAIN APP COMPONENT ---
        function App() {
          const [currentRoute, setCurrentRoute] = useState('home'); 
          const [user, setUser] = useState(null); 
          const [isMenuOpen, setIsMenuOpen] = useState(false);
          const [checkoutModal, setCheckoutModal] = useState({ isOpen: false, type: 'course' }); 

          const [lessons, setLessons] = useState(INITIAL_LESSONS);
          const [usersDb, setUsersDb] = useState([]);
          const [metrics, setMetrics] = useState({ revenueCourse: 0, revenueCorrection: 0 });

          const navigate = (route) => {
            setCurrentRoute(route);
            setIsMenuOpen(false);
            window.scrollTo(0, 0);
          };

          // Подгружаем пользователей для админки из PythonAnywhere
          useEffect(() => {
            if (currentRoute === 'admin') {
               fetch(`${API_URL}/api/users`).then(r => r.json()).then(setUsersDb).catch(e => console.error(e));
            }
          }, [currentRoute]);

          const handleLoginSuccess = (email, phone, type) => {
            const isAdmin = email === 'admin@catalyst.kz';
            const newUser = {
              id: Math.floor(Math.random() * 1000),
              email,
              phone,
              role: isAdmin ? 'admin' : 'student',
              daysActive: 0,
              progress: 0,
              hasCertificate: false,
              regDate: new Date().toISOString().split('T')[0],
              status: 'paid'
            };

            setUser(newUser);
            navigate(isAdmin ? 'admin' : 'lms');
            setCheckoutModal({ isOpen: false, type: 'course' });
          };

          const handleLogout = () => {
            setUser(null);
            navigate('home');
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-900 flex flex-col">
              <header className="bg-[#0f172a] text-white sticky top-0 z-40 shadow-md">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-center h-20">
                    <div className="flex items-center cursor-pointer" onClick={() => navigate('home')}>
                      <div className="w-10 h-10 bg-yellow-600 rounded flex items-center justify-center mr-3 font-bold text-xl">C</div>
                      <div>
                        <h1 className="text-xl font-bold tracking-tight">CATALYST</h1>
                        <p className="text-xs text-slate-400 uppercase tracking-widest leading-none mt-1">Consulting</p>
                      </div>
                    </div>
                    
                    <nav className="hidden md:flex space-x-8 items-center">
                      {currentRoute === 'home' && (
                        <>
                          <a href="#about" className="text-sm font-medium hover:text-yellow-500 transition-colors">Об инкубации</a>
                          <a href="#experts" className="text-sm font-medium hover:text-yellow-500 transition-colors">Академия экспертов</a>
                          <a href="#program" className="text-sm font-medium hover:text-yellow-500 transition-colors">Программа</a>
                        </>
                      )}
                      {user ? (
                        <div className="flex items-center space-x-4">
                          <span className="text-sm text-slate-300">{user.email}</span>
                          <button onClick={() => navigate(user.role === 'admin' ? 'admin' : 'lms')} className="text-sm font-medium bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded transition">Кабинет</button>
                          <button onClick={handleLogout} className="text-slate-400 hover:text-white"><LogOut size={20} /></button>
                        </div>
                      ) : (
                        <button onClick={() => setCheckoutModal({ isOpen: true, type: 'course' })} className="bg-yellow-600 hover:bg-yellow-500 text-white px-6 py-2.5 rounded text-sm font-bold shadow-lg transition-all">Пройти инкубацию (10 000 ₸)</button>
                      )}
                    </nav>

                    <div className="md:hidden flex items-center">
                      <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="text-slate-300 hover:text-white">
                        {isMenuOpen ? <X /> : <Menu />}
                      </button>
                    </div>
                  </div>
                </div>
              </header>

              {isMenuOpen && (
                <div className="md:hidden bg-[#0f172a] text-white absolute top-20 left-0 w-full z-30 shadow-xl border-t border-slate-800 p-4">
                  <div className="flex flex-col space-y-4">
                     {!user && (
                         <button onClick={() => { setCheckoutModal({ isOpen: true, type: 'course' }); setIsMenuOpen(false); }} className="bg-yellow-600 w-full py-3 rounded font-bold text-center">Войти / Купить курс</button>
                     )}
                     {user && (
                         <>
                            <button onClick={() => navigate(user.role === 'admin' ? 'admin' : 'lms')} className="bg-slate-800 w-full py-3 rounded font-bold text-center">Мой кабинет</button>
                            <button onClick={handleLogout} className="text-slate-400 py-2 text-center">Выйти</button>
                         </>
                     )}
                  </div>
                </div>
              )}

              <main className="flex-grow flex flex-col">
                {currentRoute === 'home' && <LandingPage setCheckoutModal={setCheckoutModal} lessons={lessons} />}
                {currentRoute === 'lms' && user?.role === 'student' && <StudentLMS user={user} setUser={setUser} lessons={lessons} setCheckoutModal={setCheckoutModal} />}
                {currentRoute === 'admin' && user?.role === 'admin' && <AdminPanel metrics={metrics} users={usersDb} lessons={lessons} />}
                {currentRoute === 'offer' && <PublicOfferPage onBack={() => navigate('home')} />}
                {currentRoute === 'privacy' && <PrivacyPolicyPage onBack={() => navigate('home')} />}
              </main>

              <footer className="bg-[#0f172a] text-slate-400 py-8 border-t border-slate-800 mt-auto">
                <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center text-sm">
                  <p>© 2026 ТОО «ADAM LABS». БИН 220440012697. Все права защищены.</p>
                  <div className="flex space-x-4 mt-4 md:mt-0">
                    <button onClick={() => navigate('offer')} className="hover:text-white transition-colors">Публичная оферта</button>
                    <button onClick={() => navigate('privacy')} className="hover:text-white transition-colors">Политика конфиденциальности</button>
                  </div>
                </div>
              </footer>

              {checkoutModal.isOpen && <CheckoutFlow API_URL={API_URL} type={checkoutModal.type} onClose={() => setCheckoutModal({ isOpen: false, type: 'course' })} onSuccess={handleLoginSuccess} />}
            </div>
          );
        }

        // --- LANDING PAGE ---
        function LandingPage({ setCheckoutModal, lessons }) {
          const [openAccordion, setOpenAccordion] = useState(0);
          return (
            <div className="w-full">
              <section className="bg-[#0f172a] text-white pt-20 pb-32 relative overflow-hidden">
                <div className="absolute top-0 right-0 -mr-20 -mt-20 w-96 h-96 bg-yellow-600/10 rounded-full blur-3xl"></div>
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 flex flex-col md:flex-row items-center">
                  <div className="md:w-3/5 pr-8">
                    <div className="inline-block px-3 py-1 bg-slate-800 text-yellow-500 rounded-full text-xs font-semibold tracking-wider mb-6 border border-slate-700">ПРЕМИУМ КОНСАЛТИНГ</div>
                    <h1 className="text-4xl md:text-6xl font-extrabold leading-tight mb-6">Catalyst Consult — <br/><span className="text-slate-300 font-light">экспертное сопровождение</span> инвестиционных проектов.</h1>
                    <p className="text-lg text-slate-400 mb-10 max-w-2xl leading-relaxed">Комплексная подготовка вашего бизнеса к привлечению инвестиций на уровне стандартов НИХ «Байтерек». Практическая программа от топ-менеджеров рынка.</p>
                    <button onClick={() => setCheckoutModal({ isOpen: true, type: 'course' })} className="bg-yellow-600 hover:bg-yellow-500 text-white px-8 py-4 rounded font-bold text-lg shadow-lg flex items-center justify-center transition-all">Пройти инкубацию (10 000 ₸) <i className="fas fa-chevron-right ml-2"></i></button>
                  </div>
                  <div className="md:w-2/5 mt-16 md:mt-0">
                    <div className="bg-slate-800/50 border border-slate-700 p-8 rounded-xl backdrop-blur-sm text-center">
                      <div className="w-24 h-24 bg-white rounded-full mx-auto flex items-center justify-center mb-6 shadow-lg"><span className="text-[#0f172a] font-extrabold text-2xl">SDU</span></div>
                      <h3 className="text-xl font-bold mb-2">Академический партнер</h3>
                      <p className="text-slate-400 text-sm">Программа разработана совместно с экспертами SDU University по заказу НАРИ АО QazInnovations.</p>
                    </div>
                  </div>
                </div>
              </section>

              <section id="experts" className="py-24 bg-slate-50">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                  <h2 className="text-3xl md:text-4xl font-bold text-[#0f172a] mb-4 uppercase tracking-widest opacity-40">Коллегия экспертов</h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-12 text-left">
                    {EXPERTS.map(expert => (
                      <div key={expert.id} className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 hover:shadow-md transition">
                        <div className="w-12 h-12 bg-slate-100 rounded-full mb-4 flex items-center justify-center text-slate-400"><Users /></div>
                        <h3 className="font-bold text-lg text-[#0f172a]">{expert.name}</h3>
                        <p className="text-yellow-600 font-bold text-[10px] mb-3 uppercase">{expert.role}</p>
                        <p className="text-slate-500 text-sm leading-relaxed">{expert.desc}</p>
                      </div>
                    ))}
                    <div className="bg-[#0f172a] p-6 rounded-xl shadow-sm border border-slate-800 flex flex-col justify-center text-white">
                        <ShieldCheck size={40} className="text-yellow-500 mb-4" />
                        <h3 className="font-bold text-lg mb-2">Высший стандарт</h3>
                        <p className="text-slate-400 text-xs">Проекты оцениваются по критериям institutional investors.</p>
                    </div>
                  </div>
                </div>
              </section>

              <section id="program" className="py-24 bg-white border-t">
                <div className="max-w-4xl mx-auto px-4">
                  <h2 className="text-3xl font-bold text-[#0f172a] mb-12 text-center uppercase tracking-widest opacity-40">Программа обучения</h2>
                  <div className="space-y-4">
                    {lessons.map((lesson, idx) => (
                      <div key={lesson.id} className="border border-slate-200 rounded-xl overflow-hidden">
                        <button onClick={() => setOpenAccordion(openAccordion === idx ? null : idx)} className="w-full px-8 py-6 flex justify-between items-center bg-slate-50 hover:bg-slate-100 transition text-left font-bold text-[#0f172a]">
                          {lesson.title} {openAccordion === idx ? <ChevronDown /> : <ChevronRight />}
                        </button>
                        {openAccordion === idx && <div className="px-8 py-6 bg-white text-slate-600 border-t flex items-start"><PlayCircle className="text-yellow-600 mr-4 mt-1" size={24} /><p className="leading-relaxed">{lesson.desc}</p></div>}
                      </div>
                    ))}
                  </div>
                </div>
              </section>
            </div>
          );
        }

        // --- CHECKOUT FLOW (CONNECTED К PYTHONANYWHERE) ---
        function CheckoutFlow({ API_URL, type, onClose, onSuccess }) {
          const [step, setStep] = useState(1);
          const [email, setEmail] = useState('');
          const [phone, setPhone] = useState('');
          
          const handlePay = async (e) => {
            e.preventDefault();
            setStep(2);
            try {
              const res = await fetch(`${API_URL}/api/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, phone })
              });
              const data = await res.json();
              if (data.success || res.status === 400) {
                 setTimeout(() => onSuccess(email, phone, type), 1500);
              } else {
                 alert("Ошибка: " + data.message);
                 setStep(1);
              }
            } catch (err) {
               alert("Сервер не отвечает!");
               setStep(1);
            }
          };

          return (
            <div className="fixed inset-0 bg-[#0f172a]/95 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-[3rem] w-full max-w-md overflow-hidden shadow-2xl p-12 text-slate-900">
                {step === 1 ? (
                  <form onSubmit={handlePay} className="space-y-6">
                    <h3 className="text-3xl font-black mb-8 tracking-tighter">Вход в кабинет</h3>
                    <input type="email" placeholder="EMAIL" className="w-full p-5 bg-slate-50 border rounded-2xl font-bold uppercase outline-none focus:ring-4 focus:ring-yellow-500/20" onChange={e => setEmail(e.target.value)} required />
                    <input type="tel" placeholder="ТЕЛЕФОН" className="w-full p-5 bg-slate-50 border rounded-2xl font-bold uppercase" onChange={e => setPhone(e.target.value)} required />
                    <button type="submit" className="w-full bg-[#0f172a] text-white py-5 rounded-2xl font-black text-lg shadow-lg hover:bg-slate-800 transition">ОПЛАТИТЬ И ВОЙТИ</button>
                    <button type="button" onClick={onClose} className="w-full text-slate-400 text-[10px] font-bold uppercase tracking-widest">Назад</button>
                  </form>
                ) : (
                  <div className="text-center py-10">
                    <RefreshCcw className="mx-auto text-yellow-600 mb-6" size={48} />
                    <h3 className="font-bold text-xl mb-2 tracking-tighter uppercase">Проверка доступа...</h3>
                    <p className="text-slate-400 text-xs font-bold uppercase tracking-widest">Связываемся с PythonAnywhere</p>
                  </div>
                )}
              </div>
            </div>
          );
        }

        // --- STUDENT LMS ---
        function StudentLMS({ user, setUser, lessons }) {
          const [activeTab, setActiveTab] = useState('courses');
          const [sel, setSel] = useState(lessons[0]);
          const [playing, setPlaying] = useState(false);
          const [prog, setProg] = useState(0);

          useEffect(() => { setPlaying(false); setProg(0); }, [sel.id]);
          useEffect(() => {
            if (playing && prog < 100) {
              const itv = setInterval(() => setProg(p => {
                if (p >= 100) { 
                  if (user.progress < sel.id) setUser(u => ({...u, progress: sel.id}));
                  setPlaying(false); return 100; 
                }
                return p + 25; 
              }), 1000);
              return () => clearInterval(itv);
            }
          }, [playing, prog]);

          return (
            <div className="flex-grow flex bg-slate-50">
              <div className="w-64 bg-white border-r hidden md:flex flex-col p-8 space-y-3">
                <h2 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-6">Навигация</h2>
                <button onClick={() => setActiveTab('courses')} className={`w-full flex items-center px-5 py-3 rounded-xl text-xs font-bold transition ${activeTab === 'courses' ? 'bg-[#0f172a] text-white shadow-xl' : 'text-slate-500 hover:bg-slate-50'}`}><BookOpen size={16} className="mr-3" /> Мои курсы</button>
                <button onClick={() => setActiveTab('certs')} className={`w-full flex items-center px-5 py-3 rounded-xl text-xs font-bold transition ${activeTab === 'certs' ? 'bg-[#0f172a] text-white shadow-xl' : 'text-slate-500 hover:bg-slate-50'}`}><Award size={16} className="mr-3" /> Сертификаты</button>
                
                <div className="mt-12 p-6 bg-purple-50 rounded-2xl border border-purple-200">
                    <p className="text-[10px] font-black text-purple-700 uppercase mb-3">Демо-панель:</p>
                    <button onClick={() => setUser({...user, daysActive: user.daysActive + 1})} className="w-full bg-white border border-purple-300 text-purple-700 py-2 rounded-lg text-[10px] font-bold mb-2 shadow-sm">+1 День</button>
                    <button onClick={() => setUser({...user, daysActive: 10})} className="w-full bg-purple-600 text-white py-2 rounded-lg text-[10px] font-bold">Открыть всё</button>
                </div>
              </div>
              
              <div className="flex-1 p-10">
                {activeTab === 'courses' && (
                  <div className="flex flex-col lg:flex-row gap-12">
                    <div className="flex-1">
                      <div className="aspect-video bg-black rounded-[3rem] mb-10 flex items-center justify-center relative shadow-2xl overflow-hidden border border-white/10 group">
                        {sel.dayRequired > user.daysActive ? (
                            <div className="text-center text-slate-600"><Lock size={64} className="opacity-20 mb-4 mx-auto" /><p className="font-bold text-[10px] uppercase">Урок доступен через {sel.dayRequired - user.daysActive} дн.</p></div>
                        ) : playing ? (
                            <div className="w-1/2 bg-slate-800 h-1 rounded-full overflow-hidden"><div className="bg-yellow-500 h-full transition-all duration-1000" style={{width:prog+'%'}}></div></div>
                        ) : user.progress >= sel.id ? (
                            <div className="text-center text-green-500"><CheckCircle size={64} className="mb-4 mx-auto" /><p className="font-black uppercase tracking-widest text-sm">Урок просмотрен</p></div>
                        ) : (
                            <button onClick={()=>setPlaying(true)} className="hover:scale-110 transition"><PlayCircle size={80} className="text-white opacity-80" /></button>
                        )}
                      </div>
                      <h2 className="text-3xl font-black mb-6 uppercase underline decoration-yellow-500 decoration-8 underline-offset-8">{sel.title}</h2>
                      <p className="text-slate-500 leading-relaxed font-medium text-lg">{sel.desc}</p>
                    </div>
                    
                    <div className="w-full lg:w-80 space-y-2">
                       <h3 className="font-black mb-8 text-slate-300 uppercase text-[10px] tracking-widest px-4">Программа инкубации:</h3>
                       {lessons.map(l => (
                         <button key={l.id} disabled={l.dayRequired > user.daysActive} onClick={() => setSel(l)} className={`w-full text-left p-6 rounded-[2rem] flex items-center gap-4 transition shadow-sm ${sel.id === l.id ? 'bg-white text-[#0f172a] shadow-2xl scale-105' : 'bg-slate-900 border border-white/5 text-slate-400 hover:bg-slate-800'} ${l.dayRequired > user.daysActive ? 'opacity-30 cursor-not-allowed' : ''}`}>
                            {l.dayRequired > user.daysActive ? <Lock size={14} /> : user.progress >= l.id ? <CheckCircle size={14} className="text-green-500" /> : <PlayCircle size={14} />}
                            <span className="text-[10px] font-black uppercase tracking-tighter">{l.title}</span>
                         </button>
                       ))}
                    </div>
                  </div>
                )}
