                                        <select name="role" className="w-full bg-slate-50 p-6 rounded-2xl font-bold uppercase text-xs outline-none border border-slate-100 cursor-pointer appearance-none">
                                            <option value="">ВЫБЕРИТЕ ПРОГРАММУ</option>
                                            <option value="scout">ИНВЕСТИЦИОННЫЙ СКАУТ</option>
                                            <option value="expert">ЭКСПЕРТ-АНАЛИТИК</option>
                                            <option value="partner">ГЕНЕРАЛЬНЫЙ ПАРТНЕР</option>
                                        </select>
                                        <button type="submit" className="w-full btn-primary py-7 rounded-2xl">Отправить заявку</button>
                                    </form>
                                </div>
                            )}

                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
