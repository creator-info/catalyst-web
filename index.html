            // --- ЗАДАЧА 1: УМНАЯ ВАЛИДАЦИЯ EMAIL ---
            const validateEmail = (email) => {
                const lower = email.toLowerCase().trim();
                if (!lower) return ''; // Пустое поле не валидируем до onBlur

                if (!lower.includes('@')) {
                    if (lower.includes('2')) return 'ОШИБКА: ВОЗМОЖНО ВЫ НАЖАЛИ "2" ВМЕСТО "@"';
                    return 'ОШИБКА: ОТСУТСТВУЕТ СИМВОЛ "@"';
                }
                
                const parts = lower.split('@');
                if (parts.length > 2) return 'ОШИБКА: ДВА СИМВОЛА "@" В АДРЕСЕ';
                
                const domain = parts[1];
                
                if (domain.includes('gmail') && !domain.endsWith('.com')) {
                    return 'ОШИБКА: ДЛЯ GMAIL ИСПОЛЬЗУЙТЕ ОКОНЧАНИЕ .COM';
                }
                
                if (domain.includes('mail') && !domain.includes('gmail') && !domain.endsWith('.ru')) {
                    return 'ОШИБКА: ДЛЯ MAIL.RU ИСПОЛЬЗУЙТЕ ОКОНЧАНИЕ .RU';
                }
                
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!re.test(lower)) return 'ОШИБКА: НЕВЕРНЫЙ ФОРМАТ ПОЧТЫ';
                
                return '';
            };

            const handleBlur = (e) => {
                const { name, value } = e.target;

                }
                if (name === 'bin') {
                    setErrors(prev => ({ 
                        ...prev, 
                        bin: value.length > 0 && value.length !== 12 ? 'ДОЛЖНО БЫТЬ РОВНО 12 ЦИФР' : '' 
                    }));
                }
            };

            const handleChange = (e) => {
                const { name, value } = e.target;
                let val = value;
                
                // --- ЗАДАЧА 2: ВАЛИДАЦИЯ БИН/ИИН (строго 12 цифр, без букв) ---
                if (name === 'bin') {
                    val = value.replace(/\D/g, '').slice(0, 12); 
                }
                
                // МГНОВЕННО УБИРАЕМ ОШИБКУ, ПОКА ЧЕЛОВЕК ПЕЧАТАЕТ

const scriptUrl = "https://script.google.com/macros/s/AKfycbxqjVpRJUIlLLs95dwKAdNGyKRad8gDt1AnwwAktveXzjtYnbUVOn8RquB43o7lE_44/exec";
                
                // Подготовка данных для отправки
                const dataToSend = new URLSearchParams({
                    email: formData.email,
                    phone: formData.phone,
                    company: formData.company,
                    bin: formData.bin,
                    projectName: formData.projectName,
                    bank: formData.bank,
                    paymentMethod: paymentMethod
                });

                try {
                    // Отправка данных
                    await fetch(scriptUrl, {
                        method: 'POST',
                        mode: 'no-cors', // Важно для работы с Google Script
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: dataToSend.toString()
                    });
                    
                    // Если дошли сюда — считаем отправку успешной
                    setSubmitSuccess(true);
                    
                    // Авто-закрытие окна через 4 секунды после успеха
                    setTimeout(() => {
                        setModal('none');
                        setSubmitSuccess(false);
                        setAgreed(false);
                        setFormData({ 
                            email: '', phone: '', company: '', bin: '', projectName: '', bank: 'Kaspi'

                    }, 4000);

                                            <option value="practicum">ОФФЛАЙН ПРАКТИКУМ (15 АПРЕЛЯ)</option>
                                            <option value="scout">ИНВЕСТИЦИОННЫЙ СКАУТ</option>
                                            <option value="expert">ЭКСПЕРТ-АНАЛИТИК</option>
                                            {/* ЗАДАЧА 3: Удален пункт "Генеральный партнер" */}
                                        </select>
                                        <button type="submit" className="w-full btn-primary py-7 rounded-2xl">Отправить заявку</button>
                                    </form>
                                </div>
                            )}

                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
